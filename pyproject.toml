[tool.black]
line-length = 100
target-version = ["py310"]
exclude = '''
/(
    \.git
  | \.github
  | venv
  | dependencies
  | migrations
)/
'''

[tool.ruff]
line-length = 100
exclude = [
    ".git",
    ".github",
    "venv",
    "dependencies",
    "migrations",
]

[tool.mypy]
python_version = "3.10"
explicit_package_bases = true
ignore_missing_imports = true
follow_imports = 'silent'
check_untyped_defs = true
exclude = [
    '^venv',
    '^dependencies',
    '^migrations',
    '^\.git',
    '^\.github',
]

[tool.pytest.ini_options]
pythonpath = "."
asyncio_default_fixture_loop_scope = "function"
addopts = [
    "--import-mode=importlib",
]
