when:
  - event: pull_request
    path:
      include:
        - .woodpecker/api-go.yml
        - api-go/**

  - event: push
    branch: main
    path:
      include:
        - .woodpecker/api-go.yml
        - api-go/**

steps:
  - name: unit tests
    image: public.ecr.aws/docker/library/golang:1.24
    commands:
      - cd api-go
      - go test ./...

  - name: e2e tests
    image: public.ecr.aws/docker/library/docker:27-cli
    environment:
      DOCKER_HOST: tcp://docker:2375
      DOCKER_TLS_CERTDIR: ""
      GO_IMAGE: public.ecr.aws/docker/library/golang:1.24
      PYTHON_IMAGE: public.ecr.aws/docker/library/python:3.12-slim
      MONGO_IMAGE: public.ecr.aws/docker/library/mongo:7.0.32-rc2-jammy
      MINIO_IMAGE: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    commands:
      - echo "Waiting for Docker daemon..."
      - for i in $(seq 1 60); do docker info >/dev/null 2>&1 && break; echo "still waiting ($i)"; sleep 1; done
      - docker info
      - cd api-go
      - E2E_SOURCE_TYPE=s3 docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e-tests
      - docker compose -f docker-compose.e2e.yml down -v

  - name: go e2e tests (s3)
    image: public.ecr.aws/docker/library/docker:27-cli
    environment:
      DOCKER_HOST: tcp://docker:2375
      DOCKER_TLS_CERTDIR: ""
      GO_IMAGE: public.ecr.aws/docker/library/golang:1.24
      MONGO_IMAGE: public.ecr.aws/docker/library/mongo:7
      MINIO_IMAGE: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    commands:
      - echo "Waiting for Docker daemon..."
      - for i in $(seq 1 60); do docker info >/dev/null 2>&1 && break; echo "still waiting ($i)"; sleep 1; done
      - cd api-go
      - docker compose -f docker-compose.go-e2e.yml up --build --abort-on-container-exit --exit-code-from go-e2e-tests
      - docker compose -f docker-compose.go-e2e.yml down -v

  - name: build and push
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
        branch: main
    settings:
      repo: ghcr.io/siberianbearofficial/sfree-api-go
      registry: ghcr.io
      username: siberianbearofficial
      password:
        from_secret: GITHUB_TOKEN
      context: api-go
      dockerfile: api-go/Dockerfile
      tag: main

services:
  - name: docker
    image: public.ecr.aws/docker/library/docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - --host=tcp://0.0.0.0:2375
      - --tls=false
