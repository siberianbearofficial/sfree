services:
  sfree-postgres-dc:
    image: postgres:16
    container_name: sfree-postgres-dc
    restart: always
    expose:
      - 5432
    ports:
      - 5433:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - sfree_net

networks:
  sfree_net:
    driver: bridge
