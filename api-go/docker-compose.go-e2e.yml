services:
  mongo:
    image: ${MONGO_IMAGE:-mongo:7}
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-01-20T14-49-07Z}
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  go-e2e-tests:
    build:
      context: .
      dockerfile: Dockerfile.go-e2e
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.24}
    environment:
      - ENV=test
      - E2E_S3_ENDPOINT=${E2E_S3_ENDPOINT:-http://minio:9000}
      - E2E_S3_BUCKET=${E2E_S3_BUCKET:-sfree-e2e-source}
      - E2E_S3_ACCESS_KEY_ID=${E2E_S3_ACCESS_KEY_ID:-minioadmin}
      - E2E_S3_SECRET_ACCESS_KEY=${E2E_S3_SECRET_ACCESS_KEY:-minioadmin}
      - E2E_S3_REGION=${E2E_S3_REGION:-us-east-1}
      - E2E_S3_PATH_STYLE=${E2E_S3_PATH_STYLE:-true}
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
