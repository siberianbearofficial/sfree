services:
  mongo:
    image: mongo:7.0.32-rc2-jammy
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    ports:
      - "27017:27017"

  # Optional: uncomment to enable Prometheus metrics scraping
  # prometheus:
  #   image: prom/prometheus:v3.2.1
