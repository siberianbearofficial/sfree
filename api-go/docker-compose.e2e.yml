services:
  mongo:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data
  api-go:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ENV=test
      - GIN_MODE=release
    depends_on:
      - mongo
    ports:
      - "8080:8080"

  e2e-tests:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    environment:
      - E2E_BASE_API_URL=http://api-go:8080
      - E2E_SOURCE_TYPE=${E2E_SOURCE_TYPE}
      - E2E_GDRIVE_KEY=${E2E_GDRIVE_KEY}
      - E2E_TELEGRAM_TOKEN=${E2E_TELEGRAM_TOKEN}
      - E2E_TELEGRAM_CHAT_ID=${E2E_TELEGRAM_CHAT_ID}
      - E2E_S3_ENDPOINT=${E2E_S3_ENDPOINT:-http://minio:9000}
      - E2E_S3_BUCKET=${E2E_S3_BUCKET:-sfree-e2e-source}
      - E2E_S3_ACCESS_KEY_ID=${E2E_S3_ACCESS_KEY_ID:-minioadmin}
      - E2E_S3_SECRET_ACCESS_KEY=${E2E_S3_SECRET_ACCESS_KEY:-minioadmin}
      - E2E_S3_REGION=${E2E_S3_REGION:-us-east-1}
      - E2E_S3_PATH_STYLE=${E2E_S3_PATH_STYLE:-true}
    depends_on:
      api-go:
        condition: service_started
      minio:
        condition: service_started
