services:
  mongo:
    image: ${MONGO_IMAGE:-mongo:7.0.32-rc2-jammy}
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-01-20T14-49-07Z}
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc}
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done;
      mc mb --ignore-existing local/sfree-data;
      exit 0;
      "

  api:
    build:
      context: ./api-go
      dockerfile: Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.24}
    environment:
      ENV: local
      DB_HOST: mongo
      DB_PORT: "27017"
      DB_USER: root
      DB_PASSWORD: example
      DB_NAME: sfree
      ACCESS_SECRET_KEY: examplesecret
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      GITHUB_REDIRECT_URL: "http://localhost:8080/api/v1/auth/github/callback"
      FRONTEND_URL: "http://localhost:3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    depends_on:
      - mongo
    ports:
      - "8080:8080"

  jaeger:
    image: jaegertracing/all-in-one:1.68
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    profiles:
      - tracing

  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:alpine}
    environment:
      API_HOST: api
      API_PORT: "8080"
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  mongo-data:
  minio-data:
