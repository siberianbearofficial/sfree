[tool.black]
line-length = 100
target-version = ["py310"]
exclude = '''
/(
    \.git
  | \.github
  | venv
  | dependencies
  | migrations
)/
'''

[tool.ruff]
line-length = 100
exclude = [
    ".git",
    ".github",
    "venv",
    "dependencies",
    "migrations",
]

[tool.mypy]
python_version = "3.10"
explicit_package_bases = true
ignore_missing_imports = true
follow_imports = 'silent'
check_untyped_defs = true
exclude = [
    '^venv',
    '^dependencies',
    '^migrations',
    '^\.git',
    '^\.github',
    # todo надо норм модельки бд сделать, чтобы починились типы
    '^src/s3/model',
    '^src/s3/service',
    '^src/gdrive/model',
    '^src/buckets/repository',
    '^src/buckets/service',
    '^src/buckets/model',
    '^src/sources/model',
    '^src/users/model',
    '^src/users/repository',
    '^src/utils/repository',
    '^src/utils/model',  # проблема с declared_attr в миксине
    '^src/utils/unitofwork'  # проблема с сессией (она nullable)
]

[tool.pytest.ini_options]
pythonpath = "."
asyncio_default_fixture_loop_scope = "function"
addopts = [
    "--import-mode=importlib",
]
