services:
  s3aas-postgres-dc:
    image: postgres:16
    container_name: s3aas-postgres-dc-local
    restart: always
    expose:
      - 5432
    ports:
      - 5555:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - s3aas_net

networks:
  s3aas_net:
    driver: bridge
