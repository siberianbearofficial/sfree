name: Dev

on:
  push:
    branches:
      - '**'
      - '!main'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Run linters, build Docker image and push it to registry
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build linters Docker image
        run: docker build --target linters -t linters-image .

      - name: Lint with ruff
        run: docker run --rm linters-image make ruff

      - name: Lint with black
        run: docker run --rm linters-image make black

      - name: Lint with mypy
        run: docker run --rm linters-image make mypy

      - name: Test with pytest
        run: |
          docker compose up -d
          docker run --rm --network s3aas_s3aas_net linters-image make test-docker

      - name: Build and push runtime Docker image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev'
          labels: ${{ steps.meta.outputs.labels }}
